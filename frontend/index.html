<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket BTC 5m Bot</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1 id="title">Polymarket BTC 5m 交易机器人</h1>
            <div class="header-controls">
                <div class="status-indicator running" id="status-indicator">
                    <span class="status-dot"></span>
                    <span id="status-text">运行中</span>
                </div>
                <div class="status-indicator stopped" id="connection-indicator">
                    <span class="status-dot"></span>
                    <span id="connection-text">已连接</span>
                </div>
            </div>
        </header>

        <!-- 设置区域 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title" id="settings-title">设置</h2>
                <div class="header-controls">
                    <div class="select-wrapper">
                        <label id="theme-label" class="visually-hidden">Theme</label>
                        <select id="theme-select">
                            <option value="system" id="theme-system">跟随系统</option>
                            <option value="light" id="theme-light">浅色</option>
                            <option value="dark" id="theme-dark">深色</option>
                        </select>
                    </div>
                    <div class="select-wrapper">
                        <label id="language-label" class="visually-hidden">Language</label>
                        <select id="language-select">
                            <option value="en">English</option>
                            <option value="ja">日本語</option>
                            <option value="zh-CN" selected>简体中文</option>
                            <option value="ko">한국어</option>
                            <option value="de">Deutsch</option>
                            <option value="fr">Français</option>
                            <option value="es">Español</option>
                        </select>
                    </div>
                </div>
            </div>

            <form>
                <div class="input-group">
                    <label id="private-key-label">私钥</label>
                    <input type="password" id="private-key" class="private-key-input" placeholder="输入您的私钥 (0x...)">
                    <p class="input-hint" id="private-key-hint">私钥仅在交易期间存储在内存中</p>
                </div>

                <div class="input-group">
                    <label>
                        <input type="checkbox" id="save-private-key"> 保存私钥到本地（可选）
                    </label>
                </div>
            </form>

            <div class="header-controls" style="margin-top: 20px;">
                <button class="btn btn-primary" id="start-btn">开始交易</button>
                <button class="btn btn-danger" id="stop-btn" disabled>停止交易</button>
            </div>
        </div>

        <!-- 交易配置 -->
        <div class="card">
            <h2 class="card-title" id="config-title">交易配置</h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label">交易对</div>
                    <div class="status-value">BTC-updown-5m</div>
                </div>
                <div class="status-item">
                    <div class="status-label">限价单价格</div>
                    <div class="status-value">10</div>
                </div>
                <div class="status-item">
                    <div class="status-label">数量</div>
                    <div class="status-value">0.5</div>
                </div>
                <div class="status-item">
                    <div class="status-label">取消窗口期</div>
                    <div class="status-value">最后 30 秒</div>
                </div>
            </div>
        </div>

        <!-- 状态 -->
        <div class="card">
            <h2 class="card-title" id="status-title">状态</h2>
            <div class="status-grid">
                <div class="status-item">
                    <div class="status-label" id="current-period-label">当前周期</div>
                    <div class="status-value" id="current-period">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="period-start-label">周期开始</div>
                    <div class="status-value" id="period-start">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="period-end-label">周期结束</div>
                    <div class="status-value" id="period-end">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="seconds-remaining-label">剩余秒数</div>
                    <div class="status-value" id="seconds-remaining">-</div>
                </div>
            </div>
            
            <div class="status-grid" style="margin-top: 16px;">
                <div class="status-item">
                    <div class="status-label" id="yes-order-label">Yes 订单</div>
                    <div class="status-value" id="yes-order">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="no-order-label">No 订单</div>
                    <div class="status-value" id="no-order">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="yes-filled-label">Yes 已成交</div>
                    <div class="status-value success" id="yes-filled">-</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="no-filled-label">No 已成交</div>
                    <div class="status-value success" id="no-filled">-</div>
                </div>
            </div>

            <div class="status-grid" style="margin-top: 16px;">
                <div class="status-item">
                    <div class="status-label" id="market-label">市场</div>
                    <div class="status-value" id="market-name">-</div>
                </div>
            </div>
        </div>

        <!-- 日志 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title" id="logs-title">日志</h2>
                <button class="btn btn-secondary" id="clear-logs-btn">清空日志</button>
            </div>
            <div class="log-container" id="logs-container">
                <p class="input-hint" id="no-logs">暂无日志</p>
            </div>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/ws.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
